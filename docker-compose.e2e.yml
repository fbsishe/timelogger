# E2E test infrastructure — SQL Server only; the app and the Timelog API stub
# are started by the test fixture. Run via scripts/run-e2e.sh.
services:
  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64  # emulated on Apple Silicon via Rosetta
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "E2e_Str0ng!Pass"
    ports:
      - "14333:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P 'E2e_Str0ng!Pass' -Q 'SELECT 1' || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'E2e_Str0ng!Pass' -Q 'SELECT 1'"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s
