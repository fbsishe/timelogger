services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "${SA_PASSWORD}"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${SA_PASSWORD}" -Q "SELECT 1" -C
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: src/TimeLogger.Web/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__Default: "Server=sqlserver,1433;Database=TimeLogger;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True"
      Timelog__BaseUrl: "${Timelog__BaseUrl}"
      Timelog__ApiKey: "${Timelog__ApiKey}"
      Jira__BaseUrl: "${Jira__BaseUrl}"
      Jira__Email: "${Jira__Email}"
      Jira__ApiToken: "${Jira__ApiToken}"
      Tempo__BaseUrl: "${Tempo__BaseUrl}"
      Tempo__Token: "${Tempo__Token}"
      Hangfire__DashboardPassword: "${Hangfire__DashboardPassword}"
      AzureAd__TenantId: "${AzureAd__TenantId}"
      AzureAd__ClientId: "${AzureAd__ClientId}"
      AzureAd__ClientSecret: "${AzureAd__ClientSecret}"
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sqlserver-data:
